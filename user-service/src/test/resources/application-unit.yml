spring:
  cloud:
    config:
      enabled: false
    compatibility-verifier:
      enabled: false
    discovery:
      enabled: false
  datasource:
    url: jdbc:h2:mem:user-service-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  kafka:
    bootstrap-servers: localhost:9092
    admin:
      auto-create: false
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  task:
    scheduling:
      enabled: false

eureka:
  client:
    enabled: false

app:
  kafka:
    user-events-topic: user-events
  outbox:
    publish-cron: '*/5 * * * * *'