server:
  port: ${SERVER_PORT:8888}

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: ${CONFIG_REPO_LOCATION:classpath:/config-repo,file:./config-repo,file:../config-repo,file:/config-repo}

management:
  endpoints:
    web:
      exposure:
        include: health,info,env
